<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AT2 百词竞赛 · 英语学习游戏</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1e2b3c 0%, #0f1a24 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
        }

        /* 主游戏面板 - 移动优先 */
        .game-container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 240, 0.96);
            border-radius: 48px 32px 48px 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.6);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* 模式选项卡 - 移动端触摸优化 */
        .mode-tabs {
            display: flex;
            background: #2c3e2f;
            gap: 6px;
            padding: 10px 16px 0 16px;
        }

        .mode-btn {
            flex: 1;
            background: #3e5a42;
            border: none;
            padding: 12px 6px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #e9f5e1;
            border-radius: 32px 32px 18px 18px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
            box-shadow: inset 0 -2px 0 #1e2a1c;
            touch-action: manipulation;
        }

        .mode-btn.active {
            background: #ffcd7e;
            color: #2d3e2a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 3px solid #f5a623;
        }

        .panel {
            padding: 20px 18px 32px;
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .panel.active-panel {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 卡片样式 */
        .quiz-card {
            background: #fffef7;
            border-radius: 40px;
            padding: 20px 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            margin-bottom: 12px;
            text-align: center;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1e3c2c;
            margin: 12px 0;
            word-break: break-word;
        }

        .hint-area {
            background: #eef4e0;
            padding: 14px;
            border-radius: 48px;
            font-family: monospace;
            font-size: 1.4rem;
            letter-spacing: 3px;
            margin: 12px 0;
            color: #2b4b1e;
            font-weight: bold;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 18px 0;
        }

        input {
            flex: 3;
            min-width: 160px;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #cbd5b5;
            border-radius: 60px;
            outline: none;
            background: white;
            font-weight: 500;
            width: 100%;
        }

        input:focus {
            border-color: #f5a623;
            box-shadow: 0 0 0 3px rgba(245,166,35,0.2);
        }

        button {
            background: #ffb347;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: #2c2c2c;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            touch-action: manipulation;
        }

        button.primary {
            background: #3f8f5e;
            color: white;
            box-shadow: 0 4px 0 #1e562e;
        }

        button.secondary {
            background: #6c757d;
            color: white;
        }

        button:active {
            transform: translateY(2px);
        }

        /* 选项网格 - 移动端两列自适应 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin: 24px 0;
        }

        .option-btn {
            background: #f0f2ea;
            padding: 14px 8px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid #cfdfb9;
            transition: all 0.15s;
            text-align: center;
            touch-action: manipulation;
        }

        .option-btn:active {
            background: #ffe1a0;
            transform: scale(0.97);
        }

        .feedback {
            background: #e9ecef;
            border-radius: 40px;
            padding: 12px;
            margin-top: 18px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .score-progress {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #d9e3c6;
            padding: 10px 18px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 8px;
        }

        .restart-btn {
            background: #1e6f5c;
            color: white;
            margin-top: 8px;
            padding: 10px 20px;
        }

        /* 手机小屏优化 */
        @media (max-width: 480px) {
            .game-container {
                border-radius: 36px 24px 36px 24px;
            }
            .quiz-card {
                padding: 18px 12px;
            }
            .question-text {
                font-size: 1.4rem;
            }
            .hint-area {
                font-size: 1.2rem;
                letter-spacing: 2px;
                padding: 10px;
            }
            .mode-btn {
                font-size: 0.8rem;
                padding: 10px 4px;
            }
            .options-grid {
                grid-template-columns: 1fr;  /* 手机窄屏单列更好点选 */
                gap: 12px;
            }
            .option-btn {
                padding: 12px;
            }
            button, .restart-btn {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
            input {
                padding: 12px 16px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">

    <div id="mode2Panel" class="panel">
        <div class="quiz-card">

    </div>

    <!-- 竞赛模块：随机100词，题型随机 -->
    <div id="racePanel" class="panel">
        <div class="quiz-card">
            <div class="score-progress">
                <span>🏅 得分: <span id="raceScore">0</span></span>
                <span>📊 进度: <span id="raceCurrent">0</span> / <span id="raceTotal">100</span></span>
            </div>
            <div id="raceQuestionArea"></div>
            <div id="raceNextArea" style="text-align: center; margin-top: 15px;">
                <button id="raceSubmitBtn" class="primary" style="display: none;">提交答案</button>
                <button id="raceRestartBtn" class="restart-btn">🔄 重新竞赛</button>
            </div>
            <div id="raceFinalMsg" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>
        </div>
    </div>
</div>

        { word: "brain", meaning: "大脑" },{ word: "contact", meaning: "联络" },{ word: "camera", meaning: "照相机" },

        { word: "armchair", meaning: "扶手椅" },{ word: "future", meaning: "未来" },{ word: "helicopter", meaning: "直升飞机" },
        { word: "dentist", meaning: "牙科医生" },{ word: "celebrate", meaning: "庆祝" },{ word: "hold", meaning: "握住;拿住" },
        { word: "hunter", meaning: "猎人" },{ word: "allowance", meaning: "津贴;零花钱" },{ word: "costume", meaning: "服装;戏装" },
        { word: "female", meaning: "女的;女性" },{ word: "band", meaning: "乐队" },{ word: "forever", meaning: "永远" },
        { word: "friendly", meaning: "友好的" },{ word: "horn", meaning: "号角;喇叭" },{ word: "comeback", meaning: "东山再起" },
        { word: "find", meaning: "发现;找到" },{ word: "even if", meaning: "即使;纵然" },{ word: "busy", meaning: "忙碌的" },
        { word: "cleaner", meaning: "清洁工人" },{ word: "decide", meaning: "决定" },{ word: "earth", meaning: "地球;土地" },
        { word: "area", meaning: "区域;面积" },{ word: "collect", meaning: "收集" },{ word: "experience", meaning: "经验;经历" },
        { word: "closet", meaning: "衣橱" },{ word: "award", meaning: "奖;奖品" },{ word: "dangerous", meaning: "危险的" },
        { word: "climb", meaning: "攀爬" },{ word: "expensive", meaning: "昂贵的" },{ word: "ceremony", meaning: "典礼" },
        { word: "button", meaning: "扣子;纽扣" },{ word: "communicate", meaning: "交流" },{ word: "clothes", meaning: "衣服" },
        { word: "hard-working", meaning: "工作努力的" },{ word: "disappear", meaning: "消失" },{ word: "calm down", meaning: "平静下来" },
        { word: "go on a diet", meaning: "节食" },{ word: "change", meaning: "改变" },{ word: "hiking", meaning: "远足;徒步旅行" }
    ];
    
    const fullVocabulary = [...wordsData];
    
    // ---------- 辅助函数：生成部分字母提示（全小写展示）----------
    function generatePartialHint(word, revealCount = 3) {
        let wordStr = word.toLowerCase();
        let letters = wordStr.split('');
        let positions = [];
        for (let i = 0; i < letters.length; i++) {
            if (letters[i].match(/[a-z]/i)) positions.push(i);
        }
        let shuffled = [...positions];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        let revealedSet = new Set(shuffled.slice(0, Math.min(revealCount, positions.length, Math.ceil(letters.length * 0.4))));
        let hintChars = [];
        for (let i = 0; i < letters.length; i++) {
            let ch = letters[i];
            if (ch.match(/[a-z]/i) && revealedSet.has(i)) {
                hintChars.push(ch.toLowerCase());
            } else if (ch.match(/[a-z]/i)) {
                hintChars.push('_');
            } else {
                hintChars.push(ch);
            }
        }
        return hintChars.join('');
    }
    
    // ---------- 模式一 ----------
    const mode1Meaning = document.getElementById('mode1Meaning');
    const mode1HintBox = document.getElementById('mode1HintBox');
    const mode1Input = document.getElementById('mode1Input');
    const mode1CheckBtn = document.getElementById('mode1CheckBtn');
    const mode1NextBtn = document.getElementById('mode1NextBtn');
    const mode1Feedback = document.getElementById('mode1Feedback');
    let currentMode1WordObj = null;
    
    function refreshMode1() {
        currentMode1WordObj = getRandomWordForMode1();
        mode1Meaning.innerText = currentMode1WordObj.meaning;
        const rawWord = currentMode1WordObj.word.toLowerCase();
        const hintStr = generatePartialHint(rawWord, 3);
        mode1HintBox.innerText = `✨ 提示: ${hintStr}   (长度 ${rawWord.length})`;
        mode1Input.value = '';
        mode1Feedback.innerHTML = '💡 根据释义和提示字母，填写完整单词～';
    }
    
    function getRandomWordForMode1() {
        const randomIndex = Math.floor(Math.random() * fullVocabulary.length);
        return { ...fullVocabulary[randomIndex] };
    }
    
    function checkMode1() {
        if (!currentMode1WordObj) return;
        const userAns = mode1Input.value.trim().toLowerCase();
        if (userAns === "") {
            mode1Feedback.innerHTML = "⚠️ 请输入单词后再核对！";
            return;
        }
        const correctWord = currentMode1WordObj.word.toLowerCase();
        const isOk = userAns === correctWord;
        if (isOk) {
            mode1Feedback.innerHTML = `✅ 完美！ “${correctWord}” 正确！ 🎉`;
        } else {
            mode1Feedback.innerHTML = `❌ 错误！ 正确答案是 “${correctWord}” 。继续努力～`;
        }
    }
    mode1CheckBtn.addEventListener('click', checkMode1);
    mode1NextBtn.addEventListener('click', () => { refreshMode1(); });
    
    // ---------- 模式二 (延时1秒自动下一题，正确/错误均如此) ----------
    const mode2WordDiv = document.getElementById('mode2Word');
    const mode2OptionsDiv = document.getElementById('mode2Options');
    const mode2FeedbackSpan = document.getElementById('mode2Feedback');
    let currentMode2WordObj = null;
    let isMode2Waiting = false;
    let mode2Timeout = null;
    
    function getRandomOptions(correctMeaning, bank) {
        let candidates = bank.filter(item => item.meaning !== correctMeaning).map(item => item.meaning);
        candidates = [...new Set(candidates)];
        if (candidates.length < 3) {
            const fallbacks = ["美丽的", "快速的", "聪明的", "巨大的", "明亮的", "温柔的"];
            for (let fb of fallbacks) if (!candidates.includes(fb)) candidates.push(fb);
        }
        let shuffled = [...candidates].sort(() => 0.5 - Math.random());
        let opts = shuffled.slice(0, 3);
        opts.push(correctMeaning);
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        return opts;
    }
    
    function loadMode2Question() {
        if (mode2Timeout) clearTimeout(mode2Timeout);
        if (isMode2Waiting) return;
        const randomIndex = Math.floor(Math.random() * fullVocabulary.length);
        currentMode2WordObj = { ...fullVocabulary[randomIndex] };
        mode2WordDiv.innerText = currentMode2WordObj.word.toLowerCase();
        const options = getRandomOptions(currentMode2WordObj.meaning, fullVocabulary);
        mode2OptionsDiv.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.addEventListener('click', () => handleMode2Answer(opt, currentMode2WordObj.meaning));
            mode2OptionsDiv.appendChild(btn);
        });
        mode2FeedbackSpan.innerHTML = "🔍 请选择一个最符合的释义～";
        isMode2Waiting = false;
    }
    
    function handleMode2Answer(selectedMeaning, correctMeaning) {
        if (isMode2Waiting) return;
        const isCorrect = (selectedMeaning === correctMeaning);
        if (isCorrect) {
            mode2FeedbackSpan.innerHTML = `🎉 正确! “${currentMode2WordObj.word.toLowerCase()}” 释义正确！ 1秒后下一题~`;
        } else {
            mode2FeedbackSpan.innerHTML = `❌ 错误! “${currentMode2WordObj.word.toLowerCase()}” 的正确释义是 “${correctMeaning}” 。1秒后下一题~`;
        }
        isMode2Waiting = true;
        // 延时1秒后加载新题目 (符合正确后1秒下一题的要求)
        mode2Timeout = setTimeout(() => {
            loadMode2Question();
            mode2Timeout = null;
        }, 1000);
    }
    
    // ---------- 竞赛模块 (保留完整功能) ----------
    class RaceManager {
        constructor(wordBank, totalCount = 100) {
            this.wordBank = [...wordBank];
            this.total = Math.min(totalCount, this.wordBank.length);
            this.questions = [];
            this.currentIndex = 0;
            this.score = 0;
            this.answered = false;
            this.initQuestions();
        }
        initQuestions() {
            const shuffledBank = [...this.wordBank];
            for (let i = shuffledBank.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledBank[i], shuffledBank[j]] = [shuffledBank[j], shuffledBank[i]];
            }
            const selectedWords = shuffledBank.slice(0, this.total);
            for (let wordObj of selectedWords) {
                const type = Math.random() < 0.5 ? 'spell' : 'choice';
                this.questions.push({ wordObj, type });
            }
        }
        getCurrentQuestion() {
            if (this.currentIndex < this.questions.length) return this.questions[this.currentIndex];
            return null;
        }
        submitSpellAnswer(userAnswer, correctWord) {
            const normalize = (s) => s.trim().toLowerCase().replace(/\s+/g, ' ').replace(/[^\w\s-]/g, '');
            const correctNorm = normalize(correctWord);
            const userNorm = normalize(userAnswer);
            const isCorrect = userNorm === correctNorm;
            if (isCorrect) this.score++;
            this.answered = true;
            return { isCorrect, correctAnswer: correctWord };
        }
        submitChoiceAnswer(selectedMeaning, correctMeaning) {
            const isCorrect = selectedMeaning === correctMeaning;
            if (isCorrect) this.score++;
            this.answered = true;
            return { isCorrect };
        }
        next() {
            if (this.currentIndex < this.questions.length - 1) {
                this.currentIndex++;
                this.answered = false;
                return true;
            }
            return false;
        }
        isFinished() {
            return this.currentIndex >= this.questions.length;
        }
        getProgress() {
            return { current: this.currentIndex + 1, total: this.questions.length, score: this.score };
        }
    }
    
    let currentRace = null;
    const raceQuestionArea = document.getElementById('raceQuestionArea');
    const raceScoreSpan = document.getElementById('raceScore');
    const raceCurrentSpan = document.getElementById('raceCurrent');
    const raceTotalSpan = document.getElementById('raceTotal');
    const raceSubmitBtn = document.getElementById('raceSubmitBtn');
    const raceRestartBtn = document.getElementById('raceRestartBtn');
    const raceFinalMsgDiv = document.getElementById('raceFinalMsg');
    let currentRaceSpellInput = null;
    
    function renderRaceQuestion() {
        if (!currentRace) return;
        const question = currentRace.getCurrentQuestion();
        if (!question || currentRace.isFinished()) {
            const progress = currentRace.getProgress();
            raceFinalMsgDiv.innerHTML = `🏁 竞赛完成! 得分: ${progress.score} / ${progress.total} 🎖️ ${progress.score >= 70 ? '🏆 单词大师' : '📚 继续加油!'}`;
            raceQuestionArea.innerHTML = `<div style="text-align:center; padding:20px;">🎉 恭喜完成百词竞赛！ 🎉<br> 最终得分: ${progress.score} / ${progress.total}</div>`;
            raceSubmitBtn.style.display = 'none';
            return;
        }
        raceFinalMsgDiv.innerHTML = '';
        raceSubmitBtn.style.display = 'inline-block';
        const progress = currentRace.getProgress();
        raceScoreSpan.innerText = progress.score;
        raceCurrentSpan.innerText = progress.current;
        raceTotalSpan.innerText = progress.total;
        
        const { wordObj, type } = question;
        if (type === 'spell') {
            const hintDisplay = generatePartialHint(wordObj.word.toLowerCase(), 3);
            raceQuestionArea.innerHTML = `
                <div style="text-align:center;">
                    <div class="question-text" style="font-size:1.4rem;">📖 中文释义:</div>
                    <div class="question-text" style="font-size:2rem; background:#fef1cf; border-radius: 60px; padding:10px;">${wordObj.meaning}</div>
                    <div class="hint-area">🔍 字母线索: ${hintDisplay}  (共 ${wordObj.word.length} 字符)</div>
                    <div class="input-group" style="justify-content:center;"><input type="text" id="raceSpellInput" placeholder="输入完整单词或短语" autocomplete="off" style="flex:2;"></div>
                </div>
            `;
            currentRaceSpellInput = document.getElementById('raceSpellInput');
        } else {
            let allMeanings = fullVocabulary.map(v => v.meaning);
            let candidates = [...new Set(allMeanings.filter(m => m !== wordObj.meaning))].sort(() => 0.5 - Math.random()).slice(0, 3);
            let options = [...candidates, wordObj.meaning];
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            raceQuestionArea.innerHTML = `
                <div style="text-align:center;">
                    <div class="question-text">🔤 单词: <strong style="background:#ffecb3; padding:6px 15px; border-radius:40px;">${wordObj.word.toLowerCase()}</strong></div>
                    <div class="options-grid" id="raceChoiceGrid"></div>
                </div>
            `;
            const grid = document.getElementById('raceChoiceGrid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.addEventListener('click', () => handleRaceChoice(opt, wordObj.meaning));
                grid.appendChild(btn);
            });
            currentRaceSpellInput = null;
        }
        // 提交按钮逻辑
        const newSubmit = raceSubmitBtn.cloneNode(true);
        raceSubmitBtn.parentNode.replaceChild(newSubmit, raceSubmitBtn);
        newSubmit.addEventListener('click', () => {
            if (!currentRace || currentRace.answered) {
                if(currentRace && !currentRace.answered) return;
                else { if(currentRace && currentRace.answered) raceFinalMsgDiv.innerHTML = "⚠️ 本题已完成，请继续"; return; }
            }
            const q = currentRace.getCurrentQuestion();
            if (!q) return;
            if (q.type === 'spell' && currentRaceSpellInput) {
                const answer = currentRaceSpellInput.value;
                const { isCorrect, correctAnswer } = currentRace.submitSpellAnswer(answer, q.wordObj.word);
                raceFinalMsgDiv.innerHTML = isCorrect ? `✅ 正确! +1分` : `❌ 错误! 正确答案: ${correctAnswer.toLowerCase()}`;
                goToNextRaceQuestion();
            } else if (q.type === 'choice') {
                raceFinalMsgDiv.innerHTML = `⚠️ 请直接点击上方选项选择答案～`;
            }
        });
    }
    
    function handleRaceChoice(selected, correctMeaning) {
        if (!currentRace || currentRace.answered) return;
        const { isCorrect } = currentRace.submitChoiceAnswer(selected, correctMeaning);
        raceFinalMsgDiv.innerHTML = isCorrect ? `✅ 正确! +1分` : `❌ 错误! 正确答案: ${correctMeaning}`;
        goToNextRaceQuestion();
    }
    
    function goToNextRaceQuestion() {
        if (!currentRace) return;
        currentRace.next();
        const progress = currentRace.getProgress();
        raceScoreSpan.innerText = progress.score;
        if (currentRace.isFinished()) {
            renderRaceQuestion();
        } else {
            renderRaceQuestion();
        }
    }
    
    function startRace() {
        currentRace = new RaceManager(fullVocabulary, 100);
        renderRaceQuestion();
    }
    raceRestartBtn.addEventListener('click', () => startRace());
    
    // ---------- 模式切换 ----------
    const modeBtns = document.querySelectorAll('.mode-btn');
    const panels = {
        mode1: document.getElementById('mode1Panel'),
        mode2: document.getElementById('mode2Panel'),
        race: document.getElementById('racePanel')
    };
    function switchMode(modeId) {
        Object.keys(panels).forEach(id => panels[id].classList.remove('active-panel'));
        panels[modeId].classList.add('active-panel');
        modeBtns.forEach(btn => {
            if (btn.dataset.mode === modeId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if (modeId === 'mode1') refreshMode1();
        if (modeId === 'mode2') { 
            if (mode2Timeout) clearTimeout(mode2Timeout);
            isMode2Waiting = false;
            loadMode2Question(); 
        }
        if (modeId === 'race' && (!currentRace || currentRace.isFinished())) startRace();
    }
    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => switchMode(btn.dataset.mode));
    });
    
    // 初始化全部
    refreshMode1();
    loadMode2Question();
    startRace();
    switchMode('mode1');
</script>
</body>
</html>
